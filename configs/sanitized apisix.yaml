```yaml
apisix:
  node_listen: 9080
  enable_ipv6: false
  enable_https: true

  ssl:
    enable: true
    listen:
      - 9443
      - 443

deployment:
  admin:
    allow_admin:
      - 10.0.0.0/24

    admin_key:
      - name: "admin"
        key: "CHANGE_ME"
        role: admin

  etcd:
    host:
      - "http://etcd-node-01:2379"

plugin_attr:
  prometheus:
    export_addr:
      ip: "0.0.0.0"
      port: 9091

plugins:
  - basic-auth
  - key-auth
  - jwt-auth
  - limit-req
  - limit-conn
  - cors
  - proxy-rewrite
  - request-id
  - response-rewrite
```
